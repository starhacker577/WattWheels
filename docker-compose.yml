version: '3.9'

services:

  backend:
    build: ./backend
    container_name: wattwheels-backend

    ports:
      - "5000:5000"

    environment:
      - MONGO_URI=mongodb://mongo:27017/wattwheels_db

    depends_on:
      - mongo

  frontend:
    build: ./frontend/app
    container_name: wattwheels-frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

  mongo:
    image: mongo
    container_name: wattwheels-mongo

    ports:
      - "27017:27017"